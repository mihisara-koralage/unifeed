[phases.setup]
nixPkgs = ["python313", "python313Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
# Create directories explicitly so Django always finds them
cmds = ["mkdir -p static staticfiles"]

[start]
# Collect static securely, then run Daphne
cmd = "python manage.py collectstatic --noinput --clear && daphne -b 0.0.0.0 -p $PORT config.asgi:application"