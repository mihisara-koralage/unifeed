{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Log in to your UniFeed account</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="username" class="form-control"
               placeholder="your@university.edu" autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">Log in</button>
    </form>

    <p class="text-center text-muted mt-3" style="font-size:13px;">
      No account? <a href="{% url 'users:register' %}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
