{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 480px;">
  <h2>Log in to UniFeed</h2>
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-danger">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary w-100 mt-3">Log in</button>
  </form>
  <p class="mt-3 text-center">No account? <a href="{% url 'users:register' %}">Register</a></p>
</div>
{% endblock %}
